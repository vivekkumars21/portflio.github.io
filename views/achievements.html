<section class="glass-box">
    <span class="section-label">Achievements</span>
    <div class="achievements-list">
        <article class="achievement-row" ng-repeat="item in main.achievements track by item.title">
            <div class="achievement-num">0{{ $index + 1 }}</div>
            <div>
                <span class="achievement-when">{{ item.when }}</span>
                <p class="achievement-name">{{ item.title }}</p>
            </div>
        </article>
    </div>
</section>
