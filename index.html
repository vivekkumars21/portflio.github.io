<!DOCTYPE html>
<html lang="en" ng-app="portfolioApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivek Kumar Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="MainController as main">
    <div class="page-wrapper">
        <nav class="navbar" aria-label="Main navigation">
            <div class="navbar-logo">Portfolio</div>
            <ul class="navbar-links">
                <li ng-repeat="item in main.navItems track by item.path">
                    <a ng-href="#{{ item.path }}" ng-class="{ active: main.isActive(item.path) }">{{ item.label }}</a>
                </li>
            </ul>
        </nav>

        <main class="view-container" ng-view></main>

        <footer class="footer-bar">
            <div class="footer-left">{{ main.profile.availability }}  ·  {{ main.profile.location }}</div>
            <nav class="footer-links" aria-label="Social links">
                <a ng-repeat="link in main.links track by link.label" ng-href="{{ link.href }}" target="_blank" rel="noopener">{{ link.label }}</a>
            </nav>
            <div class="footer-right">{{ main.profile.copyright }}</div>
        </footer>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
