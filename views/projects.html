<section class="glass-box glass-box-wide">
    <span class="section-label">Selected Works</span>
    <div class="projects-grid">
        <article class="project-card" ng-repeat="project in main.projects track by project.name">
            <div class="project-icon">{{ project.icon }}</div>
            <span class="project-tech">{{ project.stack }}</span>
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
            <a class="project-link" ng-href="{{ project.link }}" target="_blank" rel="noopener">View on GitHub</a>
        </article>
    </div>
</section>
